# Render.com Blueprint
# ─────────────────────────────────────────────────────────────────────────────
# This file lets you deploy the entire AutoInvest stack to Render.com with a
# single click.  Steps:
#  1. Sign up at https://render.com and connect your GitHub account.
#  2. Click "New ▸ Blueprint" and select this repository.
#  3. Set the required environment variables listed below.
#  4. Click "Apply" — Render will create all services automatically.
#  5. Every push to the main branch will trigger an automatic re-deploy.
#
# Required secrets to set in the Render dashboard (or via "envVarGroups"):
#   SECRET_KEY           — a random 32+ character string for JWT signing
#   GEMINI_API_KEY       — Google Gemini API key
#   FINNHUB_API_KEY      — Finnhub market-data API key
#   ALPHA_VANTAGE_API_KEY
#   NEWS_API_KEY
#   POLYGON_API_KEY      — (optional)
# ─────────────────────────────────────────────────────────────────────────────

databases:
  - name: autoinvest-db
    databaseName: autoinvest_db
    user: autoinvest_user
    plan: free

services:
  # ── Redis ───────────────────────────────────────────────────────────────────
  - type: redis
    name: autoinvest-redis
    plan: free
    ipAllowList: []   # only allow internal Render network

  # ── Backend ─────────────────────────────────────────────────────────────────
  - type: web
    name: autoinvest-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: autoinvest-db
          property: connectionString
        # asyncpg driver prefix — Render provides the standard postgres:// URL
        # so we transform it at startup via the entrypoint
      - key: DATABASE_URL_SYNC
        fromDatabase:
          name: autoinvest-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: autoinvest-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        sync: false          # set manually in Render dashboard
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: APP_NAME
        value: AutoInvest
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: CORS_ORIGINS
        value: https://autoinvest-frontend.onrender.com
      - key: GEMINI_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: ALPHA_VANTAGE_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: POLYGON_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false

  # ── Frontend ────────────────────────────────────────────────────────────────
  - type: web
    name: autoinvest-frontend
    runtime: docker
    dockerfilePath: ./frontend/web/Dockerfile
    dockerContext: ./frontend/web
    plan: free
    dockerCommand: nginx -g 'daemon off;'
    buildFilter:
      paths:
        - frontend/web/**
    envVars:
      - key: VITE_API_URL
        fromService:
          name: autoinvest-backend
          type: web
          envVarKey: RENDER_EXTERNAL_URL
        suffix: /api/v1
